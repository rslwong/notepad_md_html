<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Markdown Notepad</title>
  <style>
    /* ── Reset & Tokens ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #1e1e2e;
      --surface:   #2a2a3d;
      --surface2:  #313145;
      --border:    #44445a;
      --accent:    #7c6af7;
      --accent2:   #5b52c9;
      --text:      #e0e0f0;
      --text-muted:#9090b0;
      --success:   #4caf82;
      --danger:    #e05c7a;
      --code-bg:   #12121c;
      --radius:    8px;
      --toolbar-h: 52px;
      --statusbar-h: 26px;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Toolbar ────────────────────────────────────────────────────── */
    #toolbar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 12px;
      height: var(--toolbar-h);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    #toolbar .brand {
      font-weight: 700;
      font-size: 1rem;
      color: var(--accent);
      margin-right: 8px;
      white-space: nowrap;
    }

    .sep { width: 1px; height: 24px; background: var(--border); margin: 0 4px; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 11px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: transparent;
      color: var(--text);
      font-size: 0.82rem;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      white-space: nowrap;
    }
    .btn:hover { background: var(--surface2); border-color: var(--accent); color: var(--accent); }
    .btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn.danger:hover { border-color: var(--danger); color: var(--danger); }

    .btn svg { flex-shrink: 0; }

    /* file-input trick */
    #fileInput { display: none; }

    /* ── Main area ──────────────────────────────────────────────────── */
    #main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ── Sidebar ────────────────────────────────────────────────────── */
    #sidebar {
      width: 240px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      transition: width 0.2s, min-width 0.2s;
      min-width: 240px;
      overflow: hidden;
    }
    #sidebar.collapsed {
      width: 0;
      min-width: 0;
      border-right: none;
    }
    .sidebar-header {
      padding: 12px 16px;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #fileList {
      flex: 1;
      overflow-y: auto;
    }
    .file-item {
      padding: 10px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      font-size: 0.85rem;
      color: var(--text-muted);
    }
    .file-item:hover { background: var(--surface2); }
    .file-item.active {
      background: var(--surface2);
      color: var(--accent);
      border-left: 3px solid var(--accent);
      padding-left: 13px;
    }
    .file-item .file-name {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }
    .file-item .file-delete {
      background: none; border: none; color: var(--danger);
      cursor: pointer; opacity: 0; padding: 4px; line-height: 1;
    }
    .file-item:hover .file-delete { opacity: 1; }

    /* ── Editor ─────────────────────────────────────────────────────── */
    #editorPane {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }

    #editor {
      flex: 1;
      resize: none;
      border: none;
      outline: none;
      background: var(--bg);
      color: var(--text);
      font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      font-size: 0.93rem;
      line-height: 1.7;
      padding: 20px 24px;
      tab-size: 2;
      overflow-y: auto;
    }

    /* ── Preview ────────────────────────────────────────────────────── */
    #previewPane {
      flex: 1;
      display: none;
      flex-direction: column;
      border-left: 1px solid var(--border);
      min-width: 0;
      overflow: hidden;
    }
    #previewPane.visible { display: flex; }

    #previewHeader {
      padding: 6px 20px;
      font-size: 0.75rem;
      color: var(--text-muted);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    #preview {
      flex: 1;
      overflow-y: auto;
      padding: 20px 28px;
      background: var(--bg);
    }

    /* ── Markdown rendered styles ───────────────────────────────────── */
    #preview h1,#preview h2,#preview h3,
    #preview h4,#preview h5,#preview h6 {
      color: var(--accent);
      margin: 1.2em 0 .4em;
      line-height: 1.3;
    }
    #preview h1 { font-size: 2rem;   border-bottom: 2px solid var(--border); padding-bottom: .3em; }
    #preview h2 { font-size: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: .2em; }
    #preview h3 { font-size: 1.2rem; }
    #preview h4 { font-size: 1rem;   }
    #preview h5 { font-size: .9rem;  }
    #preview h6 { font-size: .85rem; color: var(--text-muted); }
    #preview p  { margin: .6em 0; line-height: 1.75; }
    #preview a  { color: var(--accent); }
    #preview strong { color: #fff; }
    #preview em     { color: #c9c0ff; }
    #preview del    { color: var(--text-muted); }
    #preview hr {
      border: none;
      border-top: 2px solid var(--border);
      margin: 1.4em 0;
    }
    #preview ul, #preview ol {
      margin: .6em 0 .6em 1.6em;
      line-height: 1.75;
    }
    #preview li { margin: .2em 0; }
    #preview li input[type=checkbox] { margin-right: 6px; accent-color: var(--accent); }
    #preview blockquote {
      border-left: 4px solid var(--accent);
      margin: .8em 0;
      padding: .4em 1em;
      background: var(--surface);
      border-radius: 0 var(--radius) var(--radius) 0;
      color: var(--text-muted);
    }
    #preview code {
      background: var(--code-bg);
      color: #a8e6cf;
      padding: .15em .45em;
      border-radius: 4px;
      font-family: 'Cascadia Code','Fira Code','Consolas',monospace;
      font-size: .88em;
    }
    #preview pre {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1em 1.2em;
      overflow-x: auto;
      margin: .8em 0;
    }
    #preview pre code {
      background: none;
      padding: 0;
      color: #a8e6cf;
      font-size: .88em;
    }
    #preview table {
      border-collapse: collapse;
      width: 100%;
      margin: .8em 0;
      font-size: .9rem;
    }
    #preview th, #preview td {
      border: 1px solid var(--border);
      padding: .5em .9em;
      text-align: left;
    }
    #preview th { background: var(--surface); color: var(--accent); }
    #preview tr:nth-child(even) td { background: var(--surface); }
    #preview img { max-width: 100%; border-radius: var(--radius); }

    /* ── Status bar ─────────────────────────────────────────────────── */
    #statusbar {
      height: var(--statusbar-h);
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 16px;
      font-size: 0.74rem;
      color: var(--text-muted);
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    #statusbar span b { color: var(--text); font-weight: 600; }
    #saveIndicator { margin-left: auto; color: var(--success); }

    /* ── Modal backdrop ─────────────────────────────────────────────── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.6);
      z-index: 100;
      justify-content: center;
      align-items: center;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: min(680px, 95vw);
      max-height: 88vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 24px 64px rgba(0,0,0,.5);
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .modal-header h2 { font-size: 1rem; color: var(--accent); }
    .modal-close {
      background: none; border: none; color: var(--text-muted);
      font-size: 1.3rem; cursor: pointer; line-height: 1;
    }
    .modal-close:hover { color: var(--text); }

    .modal-body {
      overflow-y: auto;
      padding: 20px;
    }

    /* ── Cheatsheet styles ──────────────────────────────────────────── */
    .cs-section { margin-bottom: 22px; }
    .cs-section h3 {
      font-size: .8rem;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--accent);
      margin-bottom: 8px;
    }
    .cs-table { width: 100%; border-collapse: collapse; font-size: .85rem; }
    .cs-table td { padding: 6px 10px; border: 1px solid var(--border); vertical-align: top; }
    .cs-table td:first-child {
      font-family: 'Cascadia Code','Fira Code','Consolas',monospace;
      background: var(--code-bg);
      color: #a8e6cf;
      white-space: pre;
      width: 50%;
    }
    .cs-table td:last-child { color: var(--text-muted); }

    /* ── Scrollbar ──────────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 7px; height: 7px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent2); }

    /* ── Drag & Drop Overlay ────────────────────────────────────────── */
    body.drag-over::after {
      content: "Drop Markdown file to import";
      position: fixed;
      inset: 0;
      background: rgba(30, 30, 46, 0.85);
      color: var(--accent);
      font-size: 2rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      border: 6px dashed var(--accent);
      pointer-events: none;
    }

    /* ── Print Styles ───────────────────────────────────────────────── */
    @media print {
      body {
        background: white;
        color: black;
        height: auto;
        overflow: visible;
      }
      #toolbar, #statusbar, .modal-overlay {
        display: none !important;
      }
      #main {
        display: block;
        overflow: visible;
      }
      #editorPane {
        display: none;
      }
      #previewPane {
        display: block !important;
        border: none;
        width: 100%;
        position: absolute;
        top: 0;
        left: 0;
        background: white;
        color: black;
      }
      #previewHeader {
        display: none;
      }
      #preview {
        padding: 0;
        overflow: visible;
        background: white;
        color: black;
      }
      /* Adjust colors for print */
      #preview h1, #preview h2, #preview h3,
      #preview h4, #preview h5, #preview h6 {
        color: black;
        border-bottom-color: #ccc;
      }
      #preview a {
        color: black;
        text-decoration: underline;
      }
      #preview strong {
        color: black;
      }
      #preview em {
        color: black;
      }
      #preview blockquote {
        border-left-color: #666;
        background: #f5f5f5;
        color: #333;
      }
      #preview code {
        background: #f5f5f5;
        color: #333;
        border: 1px solid #ddd;
      }
      #preview pre {
        background: #f5f5f5;
        border: 1px solid #ddd;
        page-break-inside: avoid;
      }
      #preview th {
        background: #f0f0f0;
        color: black;
      }
      #preview tr:nth-child(even) td {
        background: #f9f9f9;
      }
      #preview img {
        max-width: 100%;
        page-break-inside: avoid;
      }
      @page {
        margin: 2cm;
      }
    }
  </style>
</head>
<body>

<!-- ── Toolbar ─────────────────────────────────────────────────────── -->
<div id="toolbar">
  <span class="brand">📝 MD Notepad</span>
  <div class="sep"></div>

  <button class="btn" id="sidebarBtn" onclick="toggleSidebar()" title="Toggle Files (Ctrl+E)">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3h18v18H3z"/><path d="M9 3v18"/></svg>
    Files
  </button>
  <div class="sep"></div>

  <button class="btn" onclick="newFile()" title="New (Ctrl+N)">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
    New
  </button>

  <button class="btn" onclick="triggerImport()" title="Import file (Ctrl+O)">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    Import
  </button>
  <input type="file" id="fileInput" accept=".md,.txt,.markdown" onchange="importFile(event)"/>

  <button class="btn" onclick="exportFile()" title="Export Markdown (Ctrl+S)">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    Export MD
  </button>

  <button class="btn" onclick="exportHtml()" title="Export as HTML">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
    HTML
  </button>

  <div class="sep"></div>

  <button class="btn" id="previewBtn" onclick="togglePreview()" title="Toggle split preview (Ctrl+P)">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="18" rx="2"/><line x1="12" y1="3" x2="12" y2="21"/></svg>
    Preview
  </button>

  <button class="btn" onclick="openCheatsheet()" title="Markdown cheat sheet">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    Cheat Sheet
  </button>

  <div class="sep"></div>

  <button class="btn" id="exportPdfBtn" onclick="exportToPdf()" title="Export to PDF / Print (Ctrl+Shift+P)">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="12" y2="12"/><line x1="15" y1="15" x2="12" y2="12"/></svg>
    Print 
  </button>

  <div class="sep"></div>

  <!-- Inline format helpers -->
  <button class="btn" onclick="wrapSelection('**','**')" title="Bold (Ctrl+B)"><b>B</b></button>
  <button class="btn" onclick="wrapSelection('*','*')"   title="Italic (Ctrl+I)"><i>I</i></button>
  <button class="btn" onclick="wrapSelection('~~','~~')" title="Strikethrough"><s>S</s></button>
  <button class="btn" onclick="wrapSelection('`','`')"   title="Inline Code">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
  </button>
  <button class="btn" onclick="insertLinePrefix('> ')"  title="Blockquote">❝</button>
  <button class="btn" onclick="insertLinePrefix('- ')"  title="Unordered list">•—</button>
  <button class="btn" onclick="insertHr()"              title="Horizontal rule">HR</button>
</div>

<!-- ── Editor + Preview ────────────────────────────────────────────── -->
<div id="main">
  <div id="sidebar" class="collapsed">
    <div class="sidebar-header">
      <span>Files</span>
      <button class="btn" onclick="newFile()" title="New File" style="padding: 2px 6px; font-size: 0.8rem; background: var(--surface2);">+</button>
    </div>
    <div id="fileList"></div>
  </div>
  <div id="editorPane">
    <textarea id="editor" spellcheck="true" placeholder="Start writing Markdown here…"></textarea>
  </div>
  <div id="previewPane">
    <div id="previewHeader">Preview</div>
    <div id="preview"></div>
  </div>
</div>

<!-- ── Status bar ──────────────────────────────────────────────────── -->
<div id="statusbar">
  <span><b id="statWords">0</b> words</span>
  <span><b id="statChars">0</b> chars</span>
  <span><b id="statLines">0</b> lines</span>
  <span id="saveIndicator"></span>
</div>

<!-- ── Cheat Sheet Modal ───────────────────────────────────────────── -->
<div class="modal-overlay" id="cheatsheetModal">
  <div class="modal">
    <div class="modal-header">
      <h2>📋 Markdown Cheat Sheet</h2>
      <button class="modal-close" onclick="closeCheatsheet()">✕</button>
    </div>
    <div class="modal-body" id="cheatsheetBody"></div>
  </div>
</div>

<script>
/* ================================================================
   Markdown Parser  (no external deps)
   Supports: headings, bold, italic, strikethrough, inline code,
   links, images, blockquotes, ordered/unordered/task lists,
   fenced code blocks, tables, horizontal rules
   ================================================================ */

function parseMarkdown(md) {
  const lines = md.split('\n');
  let html = '';
  let i = 0;

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function inlineEsc(s) { return escHtml(s); }

  function inline(s) {
    // Step 1: Handle escape sequences - replace escaped chars with placeholders
    const escapePlaceholders = [];
    s = s.replace(/\\([\\`*_{}[\]()#+\-.!~|])/g, (match, char) => {
      const placeholder = `\u0000ESC${escapePlaceholders.length}\u0000`;
      escapePlaceholders.push(char);
      return placeholder;
    });
    
    // images before links
    s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g,
      (_,alt,src) => `<img src="${src}" alt="${escHtml(alt)}">`);
    // links
    s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g,
      (_,txt,href) => `<a href="${escHtml(href)}" target="_blank" rel="noopener">${inline_no_links(txt)}</a>`);
    // fenced inline code (backticks)
    s = s.replace(/`([^`]+)`/g, (_,c) => `<code>${escHtml(c)}</code>`);
    // bold+italic
    s = s.replace(/\*\*\*(.+?)\*\*\*/g, (_,t) => `<strong><em>${inlineEsc(t)}</em></strong>`);
    // bold
    s = s.replace(/\*\*(.+?)\*\*/g, (_,t) => `<strong>${inlineEsc(t)}</strong>`);
    s = s.replace(/__(.+?)__/g, (_,t) => `<strong>${inlineEsc(t)}</strong>`);
    // italic
    s = s.replace(/\*(.+?)\*/g, (_,t) => `<em>${inlineEsc(t)}</em>`);
    s = s.replace(/_([^_]+)_/g, (_,t) => `<em>${inlineEsc(t)}</em>`);
    // strikethrough
    s = s.replace(/~~(.+?)~~/g, (_,t) => `<del>${inlineEsc(t)}</del>`);
    
    // Step 2: Restore escaped characters
    escapePlaceholders.forEach((char, idx) => {
      s = s.replace(`\u0000ESC${idx}\u0000`, char);
    });
    
    return s;
  }

  function inline_no_links(s) {
    // Step 1: Handle escape sequences - replace escaped chars with placeholders
    const escapePlaceholders = [];
    s = s.replace(/\\([\\`*_{}[\]()#+\-.!~|])/g, (match, char) => {
      const placeholder = `\u0000ESC${escapePlaceholders.length}\u0000`;
      escapePlaceholders.push(char);
      return placeholder;
    });
    
    s = s.replace(/`([^`]+)`/g, (_,c) => `<code>${escHtml(c)}</code>`);
    s = s.replace(/\*\*(.+?)\*\*/g, (_,t) => `<strong>${inlineEsc(t)}</strong>`);
    s = s.replace(/\*(.+?)\*/g, (_,t) => `<em>${inlineEsc(t)}</em>`);
    s = s.replace(/~~(.+?)~~/g, (_,t) => `<del>${inlineEsc(t)}</del>`);
    
    // Step 2: Restore escaped characters
    escapePlaceholders.forEach((char, idx) => {
      s = s.replace(`\u0000ESC${idx}\u0000`, char);
    });
    
    return s;
  }

  function isHr(line) {
    return /^(\*{3,}|-{3,}|_{3,})\s*$/.test(line.trim());
  }

  function isHeading(line) {
    return /^#{1,6}\s/.test(line);
  }

  function parseHeading(line) {
    const m = line.match(/^(#{1,6})\s+(.+)/);
    const level = m[1].length;
    return `<h${level}>${inline(m[2])}</h${level}>`;
  }

  function isTableLine(line) { return line.trim().startsWith('|'); }

  function parseTable(tableLines) {
    let out = '<table>';
    let headerDone = false;
    for (const row of tableLines) {
      if (/^\|[\s\-|:]+\|?\s*$/.test(row.replace(/[^|\-:\s]/,''))) {
        // separator row
        if (!headerDone) { out += '</tr></thead><tbody>'; headerDone = true; }
        continue;
      }
      const cells = row.replace(/^\||\|$/g,'').split('|');
      const tag = !headerDone ? 'th' : 'td';
      if (!headerDone && !out.includes('<thead>')) out += '<thead><tr>';
      else if (headerDone) out += '<tr>';
      for (const cell of cells) {
        out += `<${tag}>${inline(cell.trim())}</${tag}>`;
      }
      out += '</tr>';
    }
    if (!headerDone) out += '</tr>';
    else out += '</tbody>';
    out += '</table>';
    return out;
  }

  // ── FIXED parseList ──────────────────────────────────────────────
  // Previously used `trimmed` (whitespace-stripped) for isOL/isUL checks,
  // which caused "- " (bullet with no text yet) to fail the regex and
  // produce an infinite loop. Now checks against the original `line`
  // using /^\s*/ so partial/empty list items are handled correctly.
  function parseList(lines, startIndex) {
    const firstLine = lines[startIndex];
    const isOrdered = /^\s*\d+\.\s/.test(firstLine);

    const tag = isOrdered ? 'ol' : 'ul';
    let out = `<${tag}>`;
    let idx = startIndex;

    const baseIndent = firstLine.match(/^(\s*)/)[1].length;

    while (idx < lines.length) {
      const line    = lines[idx];
      const indent  = line.match(/^(\s*)/)[1].length;
      const trimmed = line.trim();

      // Blank line ends the list
      if (trimmed === '') { idx++; break; }

      // Detect against original `line` (handles trailing-space-only items)
      const isOL = /^\s*\d+\.\s/.test(line);
      const isUL = /^\s*[-*+]\s/.test(line);
      const isTL = /^\s*[-*]\s+\[[ xX]\]/.test(line);

      // Not a list line — stop without consuming
      if (!isOL && !isUL) break;
      // De-dented past base — belongs to outer list
      if (indent < baseIndent) break;

      // More-indented — nested list
      if (indent > baseIndent) {
        const [subHtml, nextIdx] = parseList(lines, idx);
        out += subHtml;
        idx = nextIdx;
        continue;
      }

      // Use \s* (not \s+) so empty bullets "- " render as empty <li>
      if (isTL) {
        const checked = /\[[xX]\]/.test(trimmed);
        const text = trimmed.replace(/^[-*]\s+\[[ xX]\]\s*/, '');
        out += `<li><input type="checkbox"${checked ? ' checked' : ''} disabled> ${inline(text)}</li>`;
      } else if (isOL) {
        const text = trimmed.replace(/^\d+\.\s*/, '');
        out += `<li>${inline(text)}</li>`;
      } else {
        const text = trimmed.replace(/^[-*+]\s*/, '');
        out += `<li>${inline(text)}</li>`;
      }
      idx++;
    }

    out += `</${tag}>`;
    return [out, idx];
  }

  while (i < lines.length) {
    const line = lines[i];
    const trimmed = line.trim();

    // Blank line
    if (trimmed === '') { i++; continue; }

    // Fenced code block
    if (/^```/.test(trimmed)) {
      const lang = trimmed.slice(3).trim();
      i++;
      let code = '';
      while (i < lines.length && !/^```/.test(lines[i].trim())) {
        code += escHtml(lines[i]) + '\n';
        i++;
      }
      i++; // skip closing ```
      html += `<pre><code class="language-${escHtml(lang)}">${code}</code></pre>`;
      continue;
    }

    // Heading
    if (isHeading(line)) {
      html += parseHeading(line);
      i++;
      continue;
    }

    // HR
    if (isHr(trimmed)) {
      html += '<hr>';
      i++;
      continue;
    }

    // Blockquote
    if (/^>\s?/.test(trimmed)) {
      let bqLines = [];
      while (i < lines.length && /^>\s?/.test(lines[i].trim())) {
        bqLines.push(lines[i].trim().replace(/^>\s?/, ''));
        i++;
      }
      html += `<blockquote>${parseMarkdown(bqLines.join('\n'))}</blockquote>`;
      continue;
    }

    // Table
    if (isTableLine(line)) {
      let tableLines = [];
      while (i < lines.length && isTableLine(lines[i])) {
        tableLines.push(lines[i]);
        i++;
      }
      html += parseTable(tableLines);
      continue;
    }

    // List
    if (/^\s*([-*+]|\d+\.)\s/.test(line)) {
      const [listHtml, nextI] = parseList(lines, i);
      html += listHtml;
      i = nextI;
      continue;
    }

    // Paragraph
    let paraLines = [];
    while (i < lines.length) {
      const l = lines[i];
      const t = l.trim();
      if (t === '' || isHeading(l) || isHr(t) ||
          /^```/.test(t) || /^>\s?/.test(t) ||
          isTableLine(l) || /^\s*([-*+]|\d+\.)\s/.test(l)) break;
      paraLines.push(l);
      i++;
    }
    if (paraLines.length) {
      html += `<p>${inline(paraLines.join(' '))}</p>`;
    }
  }

  return html;
}

/* ================================================================
   App State & Storage
   ================================================================ */
let filesIndex = [];
let activeFileId = null;
let currentFilename = 'document.md';

let previewOpen = false;
let sidebarOpen = false;
let saveTimer   = null;

const editor        = document.getElementById('editor');
const previewPane   = document.getElementById('previewPane');
const previewEl     = document.getElementById('preview');
const previewBtn    = document.getElementById('previewBtn');
const sidebarBtn    = document.getElementById('sidebarBtn');
const sidebar       = document.getElementById('sidebar');
const fileList      = document.getElementById('fileList');
const saveIndicator = document.getElementById('saveIndicator');
const statWords     = document.getElementById('statWords');
const statChars     = document.getElementById('statChars');
const statLines     = document.getElementById('statLines');

function generateId() { return Math.random().toString(36).substr(2, 9); }

function loadFilesIndex() {
  const stored = localStorage.getItem('md_notepad_files');
  if (stored) {
    filesIndex = JSON.parse(stored);
  } else {
    // Migration from old version
    const oldContent = localStorage.getItem('md_notepad_content');
    const oldName = localStorage.getItem('md_notepad_filename') || 'document.md';
    if (oldContent !== null) {
      const id = generateId();
      filesIndex = [{ id, name: oldName, updated: Date.now() }];
      localStorage.setItem('md_notepad_content_' + id, oldContent);
      activeFileId = id;
    }
    // Clean up old keys
    localStorage.removeItem('md_notepad_content');
    localStorage.removeItem('md_notepad_filename');
  }
  
  activeFileId = localStorage.getItem('md_notepad_active_id');
  if (!activeFileId || !filesIndex.find(f => f.id === activeFileId)) {
    if (filesIndex.length > 0) activeFileId = filesIndex[0].id;
    else {
      const id = generateId();
      filesIndex = [{ id, name: 'document.md', updated: Date.now() }];
      activeFileId = id;
    }
  }
  saveFilesIndex();
}

function saveFilesIndex() {
  localStorage.setItem('md_notepad_files', JSON.stringify(filesIndex));
  localStorage.setItem('md_notepad_active_id', activeFileId);
}

function switchToFile(id) {
  if (activeFileId) localStorage.setItem('md_notepad_content_' + activeFileId, editor.value);
  activeFileId = id;
  const f = filesIndex.find(x => x.id === id);
  if (f) currentFilename = f.name;
  editor.value = localStorage.getItem('md_notepad_content_' + id) || '';
  saveFilesIndex();
  renderSidebar();
  updateStats();
  if (previewOpen) renderPreview();
}

function renderSidebar() {
  if (!fileList) return;
  fileList.innerHTML = '';
  const sorted = [...filesIndex].sort((a,b) => b.updated - a.updated);
  sorted.forEach(f => {
    const div = document.createElement('div');
    div.className = 'file-item' + (f.id === activeFileId ? ' active' : '');
    div.onclick = () => switchToFile(f.id);
    
    const nameSpan = document.createElement('span');
    nameSpan.className = 'file-name';
    nameSpan.textContent = f.name;
    nameSpan.title = 'Double-click to rename';
    nameSpan.ondblclick = (e) => {
      e.stopPropagation();
      const newName = prompt('Rename file:', f.name);
      if (newName && newName.trim() !== '') {
        f.name = newName.trim();
        if (f.id === activeFileId) currentFilename = f.name;
        saveFilesIndex();
        renderSidebar();
      }
    };
    
    const delBtn = document.createElement('button');
    delBtn.className = 'file-delete';
    delBtn.innerHTML = '✕';
    delBtn.title = 'Delete';
    delBtn.onclick = (e) => {
      e.stopPropagation();
      deleteFile(f.id);
    };
    
    div.appendChild(nameSpan);
    div.appendChild(delBtn);
    fileList.appendChild(div);
  });
}

function deleteFile(id) {
  if (filesIndex.length === 1) {
    if (confirm('Clear the contents of this file?')) {
      editor.value = '';
      scheduleSave();
    }
    return;
  }
  if (!confirm('Are you sure you want to delete this file?')) return;
  
  filesIndex = filesIndex.filter(x => x.id !== id);
  localStorage.removeItem('md_notepad_content_' + id);
  
  if (activeFileId === id) {
    switchToFile(filesIndex[0].id);
  } else {
    saveFilesIndex();
    renderSidebar();
  }
}

function newFile() {
  const id = generateId();
  filesIndex.push({ id, name: 'Untitled.md', updated: Date.now() });
  switchToFile(id);
}

function toggleSidebar() {
  sidebarOpen = !sidebarOpen;
  if(sidebar) sidebar.classList.toggle('collapsed', !sidebarOpen);
  if(sidebarBtn) sidebarBtn.classList.toggle('active', sidebarOpen);
}

// Initialization
loadFilesIndex();
switchToFile(activeFileId);

editor.addEventListener('input', () => {
  updateStats();
  if (previewOpen) renderPreview();
  scheduleSave();
});

/* ── Auto-save ─────────────────────────────────────────────────── */
function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    localStorage.setItem('md_notepad_content_' + activeFileId, editor.value);
    const f = filesIndex.find(x => x.id === activeFileId);
    if (f) {
      f.name = currentFilename;
      f.updated = Date.now();
      saveFilesIndex();
      renderSidebar();
    }
    saveIndicator.textContent = '✔ Saved';
    setTimeout(() => saveIndicator.textContent = '', 1800);
  }, 700);
}

/* ── Stats ─────────────────────────────────────────────────────── */
function updateStats() {
  const val   = editor.value;
  const words = val.trim() === '' ? 0 : val.trim().split(/\s+/).length;
  statWords.textContent = words;
  statChars.textContent = val.length;
  statLines.textContent = val === '' ? 0 : val.split('\n').length;
}

/* ── Preview ───────────────────────────────────────────────────── */
function renderPreview() {
  previewEl.innerHTML = parseMarkdown(editor.value);
}

function togglePreview() {
  previewOpen = !previewOpen;
  previewPane.classList.toggle('visible', previewOpen);
  previewBtn.classList.toggle('active', previewOpen);
  if (previewOpen) renderPreview();
}

/* ── Import ────────────────────────────────────────────────────── */
function triggerImport() {
  document.getElementById('fileInput').click();
}

function importFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const id = generateId();
    currentFilename = file.name;
    filesIndex.push({ id, name: currentFilename, updated: Date.now() });
    localStorage.setItem('md_notepad_content_' + id, ev.target.result);
    saveFilesIndex();
    switchToFile(id);
  };
  reader.readAsText(file);
  e.target.value = ''; // reset so same file can be re-imported
}

/* ── Export ────────────────────────────────────────────────────── */
function exportFile() {
  const blob = new Blob([editor.value], { type: 'text/markdown;charset=utf-8' });
  const a    = document.createElement('a');
  a.href     = URL.createObjectURL(blob);
  a.download = currentFilename;
  a.click();
  URL.revokeObjectURL(a.href);
}

function exportHtml() {
  const styles = document.querySelector('style').innerHTML;
  const htmlContent = parseMarkdown(editor.value);
  
  const fullHtml = `<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>${currentFilename}</title>
  <style>
    ${styles}
    body { background: var(--bg); overflow: auto; height: auto; }
    #preview { padding: 40px; max-width: 800px; margin: 0 auto; display: block; border: none; }
  </style>
</head>
<body>
  <div id="preview">
    ${htmlContent}
  </div>
</body>
</html>`;

  const blob = new Blob([fullHtml], { type: 'text/html;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = currentFilename.replace(/\.(md|markdown|txt)$/i, '') + '.html';
  a.click();
  URL.revokeObjectURL(a.href);
}

/* ── Drag & Drop Import ────────────────────────────────────────── */
document.body.addEventListener('dragover', e => {
  e.preventDefault();
  e.stopPropagation();
  if (e.dataTransfer.types.includes('Files')) {
    document.body.classList.add('drag-over');
  }
});

document.body.addEventListener('dragleave', e => {
  e.preventDefault();
  e.stopPropagation();
  document.body.classList.remove('drag-over');
});

document.body.addEventListener('drop', e => {
  e.preventDefault();
  e.stopPropagation();
  document.body.classList.remove('drag-over');
  
  if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
    const file = e.dataTransfer.files[0];
    if (file.name.match(/\.(md|markdown|txt)$/i)) {
      const reader = new FileReader();
      reader.onload = ev => {
        const id = generateId();
        currentFilename = file.name;
        filesIndex.push({ id, name: currentFilename, updated: Date.now() });
        localStorage.setItem('md_notepad_content_' + id, ev.target.result);
        saveFilesIndex();
        switchToFile(id);
      };
      reader.readAsText(file);
    } else {
      alert('Please drop a .md, .markdown, or .txt file');
    }
  }
});

/* ── Toolbar formatting helpers ────────────────────────────────── */
function wrapSelection(before, after) {
  const start  = editor.selectionStart;
  const end    = editor.selectionEnd;
  const sel    = editor.value.substring(start, end);
  editor.value = editor.value.substring(0, start) + before + sel + after + editor.value.substring(end);
  editor.setSelectionRange(start + before.length, end + before.length);
  editor.focus();
  editor.dispatchEvent(new Event('input'));
}

function insertLinePrefix(prefix) {
  const start     = editor.selectionStart;
  const lineStart = editor.value.lastIndexOf('\n', start - 1) + 1;
  editor.value    = editor.value.substring(0, lineStart) + prefix + editor.value.substring(lineStart);
  editor.setSelectionRange(start + prefix.length, start + prefix.length);
  editor.focus();
  editor.dispatchEvent(new Event('input'));
}

function insertHr() {
  const pos    = editor.selectionStart;
  const ins    = '\n\n---\n\n';
  editor.value = editor.value.substring(0, pos) + ins + editor.value.substring(pos);
  editor.setSelectionRange(pos + ins.length, pos + ins.length);
  editor.focus();
  editor.dispatchEvent(new Event('input'));
}

/* ── Keyboard shortcuts ────────────────────────────────────────── */
document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey) {
    switch (e.key.toLowerCase()) {
      case 'n': e.preventDefault(); newFile();       break;
      case 'o': e.preventDefault(); triggerImport(); break;
      case 's': e.preventDefault(); exportFile();    break;
      case 'p': e.preventDefault(); togglePreview(); break;
      case 'e': e.preventDefault(); toggleSidebar(); break;
      case 'b': e.preventDefault(); wrapSelection('**','**'); break;
      case 'i': e.preventDefault(); wrapSelection('*','*');   break;
    }    // Ctrl+Shift+P for PDF export
    if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key.toLowerCase() === 'p') {
      e.preventDefault();
      exportToPdf();
    }  }
});

// Tab key inserts 2 spaces instead of losing focus, Enter auto-continues lists
editor.addEventListener('keydown', e => {
  if (e.key === 'Tab') {
    e.preventDefault();
    const start  = editor.selectionStart;
    const end    = editor.selectionEnd;
    editor.value = editor.value.substring(0, start) + '  ' + editor.value.substring(end);
    editor.setSelectionRange(start + 2, start + 2);
    editor.dispatchEvent(new Event('input'));
  }
  
  if (e.key === 'Enter') {
    const start = editor.selectionStart;
    const end = editor.selectionEnd;
    if (start !== end) return;
    
    const textBeforeCursor = editor.value.substring(0, start);
    const lineStart = textBeforeCursor.lastIndexOf('\n') + 1;
    const currentLine = textBeforeCursor.substring(lineStart);
    
    const listMatch = currentLine.match(/^(\s*)([-*+]|\d+\.)\s+(\[[xX ]\]\s+)?/);
    if (listMatch) {
      e.preventDefault();
      const prefix = listMatch[0];
      
      // If the line is empty besides the prefix, end the list
      if (currentLine === prefix) {
        editor.value = editor.value.substring(0, lineStart) + '\n' + editor.value.substring(start);
        editor.setSelectionRange(lineStart + 1, lineStart + 1);
      } else {
        // Auto-continue the list
        let nextPrefix = prefix;
        // Auto-increment ordered lists
        const olMatch = prefix.match(/^(\s*)(\d+)\.(\s+.*)?$/);
        if (olMatch) {
          const nextNum = parseInt(olMatch[2], 10) + 1;
          nextPrefix = prefix.replace(/^(\s*)(\d+)\./, `$1${nextNum}.`);
        }
        // Uncheck next checkbox if it was checked
        nextPrefix = nextPrefix.replace(/\[[xX]\]/, '[ ]');
        
        editor.value = editor.value.substring(0, start) + '\n' + nextPrefix + editor.value.substring(end);
        editor.setSelectionRange(start + 1 + nextPrefix.length, start + 1 + nextPrefix.length);
      }
      editor.dispatchEvent(new Event('input'));
    }
  }
});

/* ── Cheat Sheet ───────────────────────────────────────────────── */
const CHEATSHEET = [
  {
    title: 'Headings',
    rows: [
      ['# Heading 1',             'Largest heading'],
      ['## Heading 2',            'Second level'],
      ['### Heading 3',           'Third level'],
      ['#### – ###### Heading 4–6', 'Smaller headings'],
    ]
  },
  {
    title: 'Emphasis',
    rows: [
      ['**bold**  or  __bold__',  'Bold text'],
      ['*italic*  or  _italic_',  'Italic text'],
      ['***bold italic***',        'Bold and italic'],
      ['~~strikethrough~~',        'Strikethrough'],
    ]
  },
  {
    title: 'Lists',
    rows: [
      ['- Item\n- Item\n  - Nested', 'Unordered list (also * or +)'],
      ['1. First\n2. Second',         'Ordered list'],
      ['- [ ] Todo\n- [x] Done',      'Task / checkbox list'],
    ]
  },
  {
    title: 'Code',
    rows: [
      ['`inline code`',           'Inline code'],
      ['```\ncode block\n```',     'Fenced code block'],
      ['```js\nconst x=1;\n```',   'Code block with language'],
    ]
  },
  {
    title: 'Links & Images',
    rows: [
      ['[Link text](https://url)', 'Hyperlink'],
      ['![Alt text](image.png)',   'Image'],
    ]
  },
  {
    title: 'Blockquote',
    rows: [
      ['> Quoted text\n> More text', 'Blockquote (nestable)'],
    ]
  },
  {
    title: 'Horizontal Rule',
    rows: [
      ['---\n***\n___', 'Horizontal rule (any 3+)'],
    ]
  },
  {
    title: 'Tables',
    rows: [
      ['| Col 1 | Col 2 |\n|-------|-------|\n| A     | B     |', 'Table'],
      ['| Left | Center | Right |\n|:-----|:------:|------:|',     'Aligned columns'],
    ]
  },
];

function openCheatsheet() {
  const body = document.getElementById('cheatsheetBody');
  if (!body.innerHTML) {
    let html = '';
    for (const section of CHEATSHEET) {
      html += `<div class="cs-section"><h3>${section.title}</h3><table class="cs-table">`;
      for (const [syntax, desc] of section.rows) {
        html += `<tr><td>${escHtmlCs(syntax)}</td><td>${desc}</td></tr>`;
      }
      html += '</table></div>';
    }
    body.innerHTML = html;
  }
  document.getElementById('cheatsheetModal').classList.add('open');
}

function escHtmlCs(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function closeCheatsheet() {
  document.getElementById('cheatsheetModal').classList.remove('open');
}

/* ── Export to PDF / Print ───────────────────────────────────────── */
function exportToPdf() {
  // Ensure preview is rendered
  if (!previewOpen) {
    togglePreview();
  }
  renderPreview();
  
  // Show a brief message to the user
  const originalText = saveIndicator.textContent;
  saveIndicator.textContent = 'Opening print dialog...';
  
  // Give the browser a moment to render, then open print dialog
  setTimeout(() => {
    window.print();
    setTimeout(() => {
      saveIndicator.textContent = originalText;
    }, 1000);
  }, 300);
}

// Close modal on backdrop click
document.getElementById('cheatsheetModal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeCheatsheet();
});

// Close modal on Escape
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeCheatsheet();
});
